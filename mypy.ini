# Mypy configuration for drug-price-api
# https://mypy.readthedocs.io/en/stable/config_file.html

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False  # Relaxed for Streamlit apps
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
strict_equality = True
strict_optional = True

# Ignore missing imports for external libraries
ignore_missing_imports = True

# Exclude generated and data files
exclude = '''
    (
        ^\.git/
        | ^__pycache__/
        | ^search_results/
        | ^validation_results/
        | ^subagent_results/
        | ^monitor_output/
        | \.json$
        | \.md$
        | \.yaml$
        | \.yml$
    )
'''

[mypy-streamlit_app.*]
# Streamlit apps have dynamic UI components
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-simple_auth.*]
# Auth module is simple, can be stricter
disallow_untyped_defs = True

[mypy-single_agent_search.*]
# Search agent is a helper module
disallow_untyped_defs = False

[mypy-extraction_agent.*]
# Extraction agent is a helper module
disallow_untyped_defs = False

[mypy-subagent_validator.*]
# Validator has complex logic
disallow_untyped_defs = False

[mypy-process_queue.*]
# Queue processor is a script
disallow_untyped_defs = False

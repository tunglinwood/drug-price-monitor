name: Auto-Update Dashboard from Subagents

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      compound_name:
        description: '化合物名称（可选，留空则更新所有）'
        required: false
        default: ''
  
  # 定时触发（每天凌晨 3 点）
  schedule:
    - cron: '0 3 * * *'
  
  # Push 触发（当有 subagent_results 目录的更新时）
  push:
    paths:
      - 'subagent_results/**'

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas
    
    - name: Collect Subagent Results
      run: |
        python subagent_collector.py
    
    - name: Update Dashboard
      run: |
        python update_dashboard_from_subagents.py
    
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if ! git diff --quiet monitor_output/latest_dashboard.json; then
          git add monitor_output/latest_dashboard.json
          git commit -m "🤖 Auto-update: Subagent 搜索结果 $(date +%Y-%m-%d)"
          git push
          echo "✅ Dashboard 已更新并推送"
        else
          echo "ℹ️ Dashboard 无变化"
        fi
    
    - name: Upload results as artifact
      uses: actions/upload-artifact@v3
      with:
        name: subagent-results
        path: subagent_results/
        retention-days: 30
